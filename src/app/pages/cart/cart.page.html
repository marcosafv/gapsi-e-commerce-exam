<app-header />

<div class="cart">
  <h1 class="cart__title">Cart</h1>

  @if (items().length === 0) {
    <p class="cart__empty">Tu carrito está vacío.</p>
  } @else {
    <div class="cart__list">
      @for (p of items(); track p.sku) {
        <div class="cart__item">
          <div class="cart__item-info">
            <div class="cart__item-name">{{ p.name }}</div>
            <div class="cart__item-sku">SKU: {{ p.sku }}</div>
          </div>
          <div class="cart__item-actions">
            <div class="cart__item-price">{{ p.price | currency }}</div>
            <button class="cart__button cart__button--danger" type="button" (click)="remove(p.sku)">Eliminar</button>
          </div>
        </div>
      }
    </div>

    <div class="cart__footer">
      <div class="cart__total">Total: {{ total() | currency }}</div>
      <button class="cart__button" type="button" (click)="clear()">Vaciar</button>
    </div>
  }
</div>
